<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exotic Market Los Del Charco</title>
  <style>
    :root {
      --gold: #f0c75e;
      --gold-dark: #a56e11;
      --green: #0f6a3a;
      --green-2: #13884a;
      --green-3: #18a558;
      --cream: #f8f4ec;
      --dark: #121212;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background: #f4f1ea;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 44px 18px 52px;
      background:
        linear-gradient(rgba(8, 36, 21, 0.55), rgba(8, 36, 21, 0.72)),
        url('images/fondo-principal.jpg') center/cover no-repeat;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.3;
      pointer-events: none;
    }

    .hero::before {
      background: #1aff7a;
      top: -80px;
      left: -60px;
    }

    .hero::after {
      background: #ffd76e;
      bottom: -120px;
      right: -80px;
    }

    .wrap {
      max-width: 1140px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .logo-box {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: min(100%, 430px);
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 14px 20px rgba(0,0,0,.35));
    }

    .brand-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 22px;
      text-align: center;
    }

    .brand-word {
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      -webkit-text-stroke: 2px #1b1304;
      text-shadow:
        0 4px 0 #6b4307,
        0 8px 18px rgba(0,0,0,0.45);
      line-height: 0.95;
    }

    .brand-word.exotic {
      font-size: clamp(2.8rem, 7vw, 5.5rem);
    }

    .brand-word.market {
      font-size: clamp(2.5rem, 6.2vw, 4.8rem);
    }

    .brand-word.charco {
      font-size: clamp(1.5rem, 3.6vw, 2.7rem);
      letter-spacing: 2px;
    }

    .contact-panel {
      max-width: 660px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-decoration: none;
      color: #fff;
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 900;
      padding: 20px 22px;
      border-radius: 22px;
      border: 2px solid rgba(240, 199, 94, 0.95);
      background: linear-gradient(180deg, rgba(24,165,88,0.96), rgba(8,96,49,0.96));
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.16) inset,
        0 0 24px rgba(34, 255, 123, 0.45),
        0 12px 30px rgba(0,0,0,0.3);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      backdrop-filter: blur(2px);
    }

    .wa-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.22) inset,
        0 0 34px rgba(57, 255, 144, 0.65),
        0 18px 36px rgba(0,0,0,0.34);
      filter: saturate(1.08);
    }

    .wa-icon {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      border-radius: 50%;
      background: #fff;
      color: var(--green-3);
      display: grid;
      place-items: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.22);
    }

    .wa-icon svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    .products {
      padding: 38px 18px 70px;
      background: linear-gradient(180deg, #f6f2eb 0%, #ece7df 100%);
      color: #17311f;
    }

    .notice {
      text-align: center;
      font-weight: 900;
      color: #114d2d;
      font-size: clamp(1.3rem, 2.8vw, 2.2rem);
      margin: 0 0 26px;
    }

    .grid {
      max-width: 1140px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: #ffffff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      position: relative;
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      background: #ececec;
    }

    .card-body {
      padding: 14px 14px 18px;
    }

    .product-name {
      margin: 0 0 10px;
      font-size: 1.05rem;
      font-weight: 800;
      color: #1f2a22;
    }

    .price {
      display: inline-block;
      background: linear-gradient(180deg, #1ea95c, #0a7240);
      color: #fff;
      font-size: 1.5rem;
      font-weight: 900;
      padding: 8px 16px;
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(15, 107, 58, 0.25);
    }

    .footer-space {
      height: 18px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card img {
        height: 240px;
      }
    }

    @media (max-width: 600px) {
      .hero {
        padding-top: 26px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .wa-btn {
        font-size: 1.35rem;
        padding: 18px 16px;
      }

      .card img {
        height: 260px;
      }
    }
  </style>
</head>
